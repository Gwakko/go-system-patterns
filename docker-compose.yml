services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET: server
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/patterns?sslmode=disable
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy

  relay:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET: relay
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/patterns?sslmode=disable
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: patterns
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: pg_isready -U postgres
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
